<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Campus Seating Tracker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
    }

    .header {
      background: #1E3A8A;
      padding: 20px 24px;
      text-align: center;
    }

    .header-logo {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #93C5FD;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 800;
      color: #FFFFFF;
    }

    .body {
      padding: 32px 24px;
    }

    .location-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #94A3B8;
      margin-bottom: 8px;
      text-align: center;
    }

    .location-name {
      font-size: 26px;
      font-weight: 900;
      color: #0F172A;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 28px;
    }

    .question {
      font-size: 14px;
      color: #64748B;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 20px 16px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-checkin  { background: #22C55E; color: #FFFFFF; }
    .btn-checkout { background: #EF4444; color: #FFFFFF; }

    /* Success screen */
    .success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 12px 0;
    }

    .success-emoji {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .success-title {
      font-size: 26px;
      font-weight: 900;
      color: #0F172A;
    }

    .success-sub {
      font-size: 14px;
      color: #64748B;
      line-height: 1.5;
      max-width: 240px;
    }

    /* Loading state */
    .loading-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 24px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E2E8F0;
      border-top-color: #1E3A8A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: #64748B;
    }

    .footer {
      padding: 14px 24px 18px;
      border-top: 1px solid #F1F5F9;
      text-align: center;
      font-size: 11px;
      color: #CBD5E1;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="header-logo">HELP Matriculation Centre</div>
      <div class="header-title">Campus Seating Tracker</div>
    </div>

    <div class="body">

      <!-- Main buttons view -->
      <div id="main-view">
        <div class="location-label">You are at</div>
        <div class="location-name" id="location-name">Loading...</div>
        <div class="question">What are you doing?</div>
        <div class="btn-group">
          <button class="btn btn-checkin" onclick="handleTap('checkin')">
            🪑 &nbsp; Taking a seat
          </button>
          <button class="btn btn-checkout" onclick="handleTap('checkout')">
            👋 &nbsp; Leaving this seat
          </button>
        </div>
      </div>

      <!-- Loading view -->
      <div class="loading-view" id="loading-view">
        <div class="spinner"></div>
        <div class="loading-text">Updating seat status...</div>
      </div>

      <!-- Success view -->
      <div class="success-view" id="success-view">
        <div class="success-emoji" id="s-emoji">🪑</div>
        <div class="success-title" id="s-title">Seat Taken!</div>
        <div class="success-sub" id="s-sub">This seat is now marked as occupied.</div>
      </div>

    </div>

    <div class="footer">Scan the QR code on the table to update availability</div>
  </div>

  <script>
    // ================================================
    // STEP 1: Replace this URL with your Google Apps
    // Script Web App URL (from the deployment step)
    // ================================================
    const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";

    // Read the table name from the URL
    // e.g. ?table=Level-2-Table-1 becomes "Level 2 Table 1"
    const params = new URLSearchParams(window.location.search);
    const tableName = params.get('table') || 'Unknown Area';
    document.getElementById('location-name').textContent = tableName.replace(/-/g, ' ');

    function handleTap(action) {
      // Show loading
      show('loading-view');

      // Send to Google Apps Script (fire and forget)
      const time = new Date().toLocaleTimeString('en-MY', {hour:'2-digit', minute:'2-digit'});
      const url = `${APPS_SCRIPT_URL}?table=${encodeURIComponent(tableName)}&action=${action}&time=${encodeURIComponent(time)}`;
      fetch(url, { mode: 'no-cors' }).catch(() => {});

      // Short delay to feel responsive, then show success
      setTimeout(() => {
        const isCheckin = action === 'checkin';
        document.getElementById('s-emoji').textContent  = isCheckin ? '🪑' : '🟢';
        document.getElementById('s-title').textContent  = isCheckin ? 'Seat Taken!' : 'Seat Freed!';
        document.getElementById('s-sub').textContent    = isCheckin
          ? 'This seat is now marked as occupied. Enjoy your break!'
          : 'This seat is now marked as free. Thank you!';

        show('success-view');

        // Reset after 4 seconds
        setTimeout(() => show('main-view'), 4000);
      }, 800);
    }

    function show(viewId) {
      ['main-view', 'loading-view', 'success-view'].forEach(id => {
        const el = document.getElementById(id);
        if (id === viewId) {
          el.style.display = id === 'main-view' ? 'block' : 'flex';
        } else {
          el.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HELP University — Seating Tracker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    /* Header */
    .header {
      background: #C8102E;
      padding: 20px 24px 16px;
      text-align: center;
    }

    .header-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 3px 12px;
      margin-bottom: 10px;
    }

    .header-badge span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
    }

    .header-title {
      font-size: 18px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 2px;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.65);
    }

    /* Body */
    .body {
      padding: 24px 24px 20px;
    }

    .location-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FFF0F0;
      border: 1px solid #FFCDD2;
      border-radius: 20px;
      padding: 5px 14px;
      margin-bottom: 10px;
    }

    .location-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #C8102E;
      flex-shrink: 0;
    }

    .location-pill span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #C8102E;
    }

    .location-name {
      font-size: 22px;
      font-weight: 900;
      color: #1A1A1A;
      line-height: 1.2;
    }

    /* Student ID input */
    .input-wrap {
      margin-bottom: 18px;
    }

    .input-label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
      display: block;
    }

    .student-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #E5E5E5;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      color: #1A1A1A;
      outline: none;
      transition: border-color 0.2s;
      background: #FAFAFA;
    }

    .student-input::placeholder {
      color: #BBBBBB;
      font-weight: 400;
    }

    .student-input:focus {
      border-color: #C8102E;
      background: #FFFFFF;
    }

    .student-input.filled {
      border-color: #C8102E;
      background: #FFFFFF;
    }

    /* Buttons */
    .action-label {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-bottom: 12px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .btn {
      width: 100%;
      padding: 17px 16px;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.2px;
    }

    .btn:active  { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .btn-checkin {
      background: #C8102E;
      color: #FFFFFF;
      border: 2px solid #C8102E;
    }

    .btn-checkout {
      background: #FFFFFF;
      color: #C8102E;
      border: 2px solid #C8102E;
    }

    /* Loading */
    .loading-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #FFCDD2;
      border-top-color: #C8102E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: #999;
    }

    /* Success */
    .success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 20px 0 12px;
    }

    .success-circle {
      width: 72px;
      height: 72px;
      background: #FFF0F0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 6px;
    }

    .success-title {
      font-size: 24px;
      font-weight: 900;
      color: #1A1A1A;
    }

    .success-sub {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }

    .success-tag {
      background: #FFF0F0;
      border: 1px solid #FFCDD2;
      border-radius: 8px;
      padding: 6px 16px;
      margin-top: 4px;
    }

    .success-tag span {
      font-size: 11px;
      color: #C8102E;
      font-weight: 700;
    }

    /* Footer */
    .footer {
      padding: 12px 24px 16px;
      border-top: 1px solid #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-brand { font-size: 10px; color: #C8102E; font-weight: 700; }
    .footer-sep   { font-size: 10px; color: #ddd; }
    .footer-text  { font-size: 10px; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="header-badge"><span>HELP University</span></div>
      <div class="header-title">Seating Tracker</div>
      <div class="header-sub">Campus Availability System</div>
    </div>

    <div class="body">

      <!-- Main view -->
      <div id="main-view">
        <div class="location-wrap">
          <div class="location-pill">
            <span class="location-pill-dot"></span>
            <span>You are at</span>
          </div>
          <div class="location-name" id="location-name">Loading...</div>
        </div>

        <!-- Student ID input -->
        <div class="input-wrap">
          <label class="input-label" for="student-id">Your student ID</label>
          <input
            class="student-input"
            id="student-id"
            type="text"
            placeholder="e.g. 2024001234"
            maxlength="20"
            autocomplete="off"
            oninput="onInput(this)"
          />
        </div>

        <div class="action-label">Select an action below</div>

        <div class="btn-group">
          <button class="btn btn-checkin" id="btn-in" onclick="handleTap('checkin')" disabled>
            🪑 &nbsp; Taking a seat
          </button>
          <button class="btn btn-checkout" id="btn-out" onclick="handleTap('checkout')" disabled>
            👋 &nbsp; Leaving this seat
          </button>
        </div>
      </div>

      <!-- Loading view -->
      <div class="loading-view" id="loading-view">
        <div class="spinner"></div>
        <div class="loading-text">Updating seat status...</div>
      </div>

      <!-- Success view -->
      <div class="success-view" id="success-view">
        <div class="success-circle" id="s-icon">🪑</div>
        <div class="success-title"  id="s-title">Seat Taken!</div>
        <div class="success-sub"   id="s-sub">This seat is now marked as occupied.</div>
        <div class="success-tag">
          <span id="s-tag">Lounge 1 Table 1 · Occupied</span>
        </div>
      </div>

    </div>

    <div class="footer">
      <span class="footer-brand">HELP</span>
      <span class="footer-sep">·</span>
      <span class="footer-text">Campus Seating System</span>
    </div>

  </div>

  <script>
    // ============================================================
    // Replace with your Google Apps Script Web App URL
    // ============================================================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxktbJ8Ii4XKmp8PTKJre3XjSXY7n_hsE2JNmwq_w5xNFoQVaJdjFA6BfA9izVId-2f/exec";

    const params       = new URLSearchParams(window.location.search);
    const tableName    = params.get('table') || 'Unknown Area';
    const tableDisplay = tableName.replace(/-/g, ' ');
    document.getElementById('location-name').textContent = tableDisplay;

    // Enable buttons only when student ID is typed
    function onInput(input) {
      const hasValue = input.value.trim().length > 0;
      document.getElementById('btn-in').disabled  = !hasValue;
      document.getElementById('btn-out').disabled = !hasValue;
      input.classList.toggle('filled', hasValue);
    }

    function handleTap(action) {
      const studentId = document.getElementById('student-id').value.trim();
      if (!studentId) return;

      show('loading-view');

      const time = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
      const url  = `${APPS_SCRIPT_URL}?table=${encodeURIComponent(tableName)}&action=${action}&time=${encodeURIComponent(time)}&studentid=${encodeURIComponent(studentId)}`;
      fetch(url, { mode: 'no-cors' }).catch(() => {});

      setTimeout(() => {
        const isCheckin = action === 'checkin';
        document.getElementById('s-icon').textContent  = isCheckin ? '🪑' : '🟢';
        document.getElementById('s-title').textContent = isCheckin ? 'Seat Taken!'   : 'Seat Freed!';
        document.getElementById('s-sub').textContent   = isCheckin
          ? 'This seat is now marked as occupied. Enjoy your break!'
          : 'This seat is now marked as free. Thank you!';
        document.getElementById('s-tag').textContent   = `${tableDisplay} · ${isCheckin ? 'Occupied' : 'Free'}`;

        show('success-view');

        // Reset after 4 seconds
        setTimeout(() => {
          document.getElementById('student-id').value = '';
          document.getElementById('student-id').classList.remove('filled');
          document.getElementById('btn-in').disabled  = true;
          document.getElementById('btn-out').disabled = true;
          show('main-view');
        }, 4000);
      }, 800);
    }

    function show(id) {
      ['main-view', 'loading-view', 'success-view'].forEach(v => {
        const el = document.getElementById(v);
        el.style.display = v === id ? (v === 'main-view' ? 'block' : 'flex') : 'none';
      });
    }
  </script>
</body>
</html>
